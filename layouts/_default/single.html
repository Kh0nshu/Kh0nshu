{{ define "main" }}
  <article class="mw8 center ph3 ph4-ns pv4">
    <h1 style="font-size: 2.5rem; font-weight: 700; margin-bottom: 1rem;">
      {{ if .Title }}
        {{ .Title }}
      {{ else if .File }}
        {{ .File.ContentBaseName | replaceRE "[-_]+" " " | title }}
      {{ end }}
    </h1>

    {{ .Content }}
  </article>
{{ end }}
