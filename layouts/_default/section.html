{{ define "main" }}
  <section class="mw8 center ph3 ph4-ns pv4">
    <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 1rem;">
      {{ .Title }}
    </h1>

    {{ .Content }}

    <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1rem; margin-top:1.5rem;">
      {{ range .Pages }}
        <a href="{{ .RelPermalink }}" style="display:block; width:100%; min-width:0; max-width:100%; padding:1rem; border:1px solid #ddd; border-radius:12px; text-decoration:none; color:inherit; box-sizing:border-box; overflow:hidden;">
          <h2 style="display:block; width:100%; max-width:100%; margin:0 0 0.5rem 0; font-size:1.25rem; font-weight:700; line-height:1.3; white-space:normal; overflow-wrap:break-word; word-wrap:break-word; word-break:break-word; hyphens:auto; box-sizing:border-box;">
            {{ if .Title }}
              {{ .Title }}
            {{ else if .File }}
              {{ .File.ContentBaseName | replaceRE "[-_]+" " " | title }}
            {{ else }}
              Untitled
            {{ end }}
          </h2>

          {{ with .Summary }}
            <p style="display:block; width:100%; max-width:100%; margin:0; opacity:0.8; white-space:normal; overflow-wrap:break-word; word-wrap:break-word; word-break:break-word; hyphens:auto; box-sizing:border-box;">
              {{ . }}
            </p>
          {{ end }}
        </a>
      {{ end }}
    </div>
  </section>
{{ end }}
